name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
          cabal-version: 'latest'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: cabal-${{ runner.os }}-

      - name: Update cabal
        run: cabal update

      - name: Run tests
        run: cabal test
